<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python HTML Gateway</title>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; }
        .container { max-width: 920px; margin: 40px auto; padding: 24px; background: rgba(15, 23, 42, 0.95); border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.35); }
        h1 { margin: 0 0 12px; font-size: 2.4rem; }
        p { color: #94a3b8; margin: 8px 0 24px; }
        .row { display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: stretch; }
        input[type=text] { width: 100%; border-radius: 14px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; padding: 14px 16px; font-size: 1rem; }
        button { border: none; border-radius: 14px; padding: 14px 18px; background: #2563eb; color: white; font-weight: 700; cursor: pointer; transition: transform .18s ease, background .18s ease; }
        button:hover { transform: translateY(-1px); background: #1d4ed8; }
        .output { margin-top: 22px; background: #111827; border: 1px solid #334155; border-radius: 16px; padding: 18px; min-height: 220px; white-space: pre-wrap; font-family: Consolas, monospace; }
        .status { display: inline-flex; gap: 10px; align-items: center; padding: 12px 16px; border-radius: 14px; background: #1e293b; margin-bottom: 18px; }
        .status strong { color: #38bdf8; }
        .toolbar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Python ↔ HTML Gateway</h1>
        <p>This interface uses a local Ollama/Gemma4 backend through a Python gateway. It avoids external Google AI keys and sends prompts directly to your local model.</p>

        <div class="status" id="statusBox">Loading backend status...</div>

        <div class="toolbar">
            <button onclick="clearOutput()">Clear Output</button>
            <button onclick="location.reload()">Reload Page</button>
        </div>

        <div class="row">
            <input id="promptInput" type="text" placeholder="Type a prompt, then press Send..." />
            <button onclick="sendPrompt()">Send</button>
        </div>

        <div class="output" id="outputBox">Ready.</div>
    </div>

    <script>
        const outputBox = document.getElementById('outputBox');
        const statusBox = document.getElementById('statusBox');

        async function fetchStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                if (!data.success) throw new Error(data.message || 'Status failed');
                let html = `<strong>Model:</strong> ${data.model}<br><strong>Status:</strong> ${data.status}`;
                try {
                    const h = await fetch('/api/ollama-health');
                    const hdata = await h.json();
                    if (h.ok && hdata.success) {
                        html += `<br><strong>Ollama:</strong> reachable`;
                    } else {
                        html += `<br><strong>Ollama:</strong> not reachable`;
                    }
                } catch (e) {
                    html += `<br><strong>Ollama:</strong> health check failed`;
                }
                statusBox.innerHTML = html;
            } catch (err) {
                statusBox.textContent = 'Backend unavailable: ' + err.message;
            }
        }

        async function sendPrompt() {
            const prompt = document.getElementById('promptInput').value.trim();
            if (!prompt) return;
            outputBox.textContent = 'Sending prompt...';
            try {
                const res = await fetch('/api/ask-ollama', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt }),
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.message || 'No answer');
                outputBox.textContent = data.answer;
            } catch (err) {
                outputBox.textContent = 'Error: ' + err.message;
            }
        }


        function clearOutput() {
            outputBox.textContent = 'Ready.';
        }

        window.addEventListener('load', fetchStatus);
        document.getElementById('promptInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') sendPrompt();
        });
    </script>
</body>
</html>
