<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synora AI Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-shell">
        <div class="auth-card">
            <div class="brand-bar">
                <div>
                    <div class="brand-title">SYNORA AI</div>
                    <div class="brand-subtitle">Secure access to your assistant</div>
                </div>
            </div>

            <div class="tabs">
                <button class="tab-button active" data-target="login-panel">Sign In</button>
                <button class="tab-button" data-target="register-panel">Register</button>
            </div>

            <div class="panel active" id="login-panel">
                <h2>Welcome Back</h2>
                <p>Login to access your Synora dashboard.</p>
                <form id="loginForm">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="you@example.com" required>
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter your password" required>
                    <button type="submit">Login</button>
                </form>
            </div>

            <div class="panel" id="register-panel">
                <h2>Create Account</h2>
                <p>Use an existing account or create a new one.</p>
                <form id="registerForm">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="you@example.com" required>
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Choose a password" required>
                    <label>Confirm Password</label>
                    <input type="password" name="confirm" placeholder="Repeat password" required>
                    <button type="submit">Register</button>
                </form>
            </div>

            <div id="message" class="message"></div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const tabs = document.querySelectorAll('.tab-button');
        const panels = document.querySelectorAll('.panel');
        const messageDiv = document.getElementById('message');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                panels.forEach(panel => panel.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.target).classList.add('active');
                messageDiv.textContent = '';
            });
        });

        document.getElementById('loginForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const formData = new FormData(event.target);
            const response = await fetch('/authenticate', { method: 'POST', body: formData });
            const result = await response.json();
            messageDiv.textContent = result.message;
            messageDiv.className = result.success ? 'message success' : 'message error';

            if (response.ok && result.email) {
                window.location.href = `/dashboard?email=${encodeURIComponent(result.email)}`;
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const formData = new FormData(event.target);
            const response = await fetch('/register', { method: 'POST', body: formData });
            const result = await response.json();
            messageDiv.textContent = result.message;
            messageDiv.className = result.success ? 'message success' : 'message error';
        });
    </script>
</body>
</html>
